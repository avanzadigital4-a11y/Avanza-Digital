<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Contratación | Avanza Digital</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path d=%22M10 20 L40 50 L10 80 L30 80 L60 50 L30 20 Z%22 fill=%22%230044cc%22/><path d=%22M45 20 L75 50 L45 80 L65 80 L95 50 L65 20 Z%22 fill=%22%2300cccc%22/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #000; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; padding: 20px; }
        .contract-container { max-width: 500px; width: 100%; }
        .contract-box { background: #111; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 40px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #ccc; font-size: 0.9rem; }
        .form-control { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; font-size: 1rem; }
        .form-control:focus { outline: none; border-color: #3b82f6; }
        .plan-summary { background: rgba(59, 130, 246, 0.1); border-left: 4px solid #3b82f6; padding: 15px; margin-bottom: 25px; border-radius: 4px; }
        .terms { font-size: 0.8rem; color: #666; display: flex; gap: 10px; align-items: flex-start; margin-bottom: 25px; }
        .btn-submit { width: 100%; background: #3b82f6; color: white; border: none; padding: 15px; font-weight: 700; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn-submit:hover { background: #2563eb; }
    </style>
</head>
<body>

    <div class="contract-container">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="font-size: 1.8rem;">Solicitud de Contratación</h2>
            <p style="color: #888;">Paso 1 de 2: Datos de Facturación</p>
        </div>

        <div class="contract-box">
            
            <div class="plan-summary">
                <p style="margin:0; font-size: 0.9rem; color: #bfdbfe;">Estás solicitando:</p>
                <h3 id="planDisplay" style="margin: 5px 0 0 0; color: white;">Cargando plan...</h3>
            </div>

            <form action="https://script.google.com/macros/s/AKfycbzOPqONZsGaHmTf3cNdsXs-TCZr-zNBz3ewTeHDxgQf171BqjIqcMDCPxI4Xu6qi8c/exec" method="POST">
                
                <input type="hidden" name="plan_seleccionado" id="planInput">
                <input type="hidden" name="codigo_orden" id="orderId">
                
                <input type="hidden" name="precio_usd" id="precioInput">

                <div class="form-group">
                    <label>Razón Social / Nombre Empresa</label>
                    <input type="text" name="empresa" class="form-control" required placeholder="Ej: Industrias Metalúrgicas SA">
                </div>

                <div class="form-group">
                    <label>Nombre del Responsable</label>
                    <input type="text" name="nombre_contacto" class="form-control" required placeholder="Persona que autoriza el pago">
                </div>

                <div class="form-group">
                    <label>Email de Facturación</label>
                    <input type="email" name="email" class="form-control" required placeholder="donde enviaremos la factura">
                </div>

                <div class="form-group">
                    <label>Teléfono / WhatsApp</label>
                    <input type="tel" name="telefono" class="form-control" required placeholder="+54 9 ...">
                </div>

                <div class="terms">
                    <input type="checkbox" required id="checkTerms" style="margin-top: 3px;">
                    <label for="checkTerms" style="display:inline; color:#888;">Entiendo que al enviar esta solicitud recibiré una factura por transferencia bancaria. El servicio se activa una vez acreditado el pago.</label>
                </div>

                <button type="submit" class="btn-submit">CONFIRMAR Y SOLICITAR</button>
            </form>
            
            <div style="text-align: center; margin-top: 20px;">
                <a href="index.html" style="color: #666; font-size: 0.9rem; text-decoration: none;">&larr; Volver a planes</a>
            </div>
        </div>
    </div>

    <script>
        // 1. Obtener el plan de la URL
        const params = new URLSearchParams(window.location.search);
        const plan = params.get('plan') || 'Plan General';
        
        // 2. Mostrarlo en pantalla y guardarlo en el input hidden
        document.getElementById('planDisplay').innerText = plan;
        document.getElementById('planInput').value = plan;

        // 3. EXTRAER EL PRECIO AUTOMÁTICAMENTE SEGÚN EL NOMBRE DEL PLAN
        let precio = "0";
        // Esta línea atrapa cualquier número que esté al lado de "USD" (ej: USD450 o USD7500)
        let coincidencia = plan.match(/USD\s*(\d+)/i); 
        
        if (coincidencia) {
            precio = coincidencia[1]; // Aquí guarda el 450 o el 7500
        } else if (params.get('precio')) {
            precio = params.get('precio'); // Plan B: por si en el futuro mandas el precio separado en la URL
        }
        
        // Asignamos el precio extraído al campo oculto para que viaje en el formulario
        document.getElementById('precioInput').value = precio;

        // 4. Generar ID de Orden (Simulado en Frontend para referencia rápida)
        const year = new Date().getFullYear();
        const randomCode = Math.floor(1000 + Math.random() * 9000); 
        const orderCode = `AVZ-${year}-${randomCode}`;
        document.getElementById('orderId').value = orderCode;
    </script>
<script type="text/javascript" id="hs-script-loader" async defer src="//js.hs-scripts.com/51067454.js"></script>
</body>
</html>
